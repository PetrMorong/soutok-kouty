backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

# Netlify Identity — použijte Netlify Identity pro přihlášení
# Po nasazení: Site Settings → Identity → Enable → Git Gateway → Enable

collections:

  # ─── HLAVNÍ NASTAVENÍ PROJEKTU ───────────────────────────
  - name: "settings"
    label: "⚙️ Nastavení projektu"
    files:
      - name: "project"
        label: "Projekt — základní info"
        file: "_data/project.json"
        fields:
          - { label: "Status", name: "status", widget: "select",
              options: ["Předprodej", "V prodeji", "Vyprodáno"] }
          - { label: "Název projektu", name: "title", widget: "string" }
          - { label: "Perex (krátký popis pod hero)", name: "perex", widget: "text" }
          - { label: "Výnos p.a. (zobrazený v hero)", name: "yield_pct", widget: "string",
              hint: "Např. 6,7 %" }
          - { label: "Termín dokončení", name: "completion", widget: "string",
              hint: "Např. Leden 2028" }
          - { label: "Počet jednotek", name: "units", widget: "number" }
          - { label: "Timeline — % dokončení (0–100)", name: "timeline_fill", widget: "number",
              value_type: "int", min: 0, max: 100 }
          - label: "Mode webu"
            name: "mode"
            widget: "select"
            options:
              - { label: "Hotel v přípravě (předprodej)", value: "hotel_sale" }
              - { label: "Ubytovací web (po otevření)", value: "booking" }
            hint: "Přepnutím na 'booking' se CTA změní z 'Zjistit ceny' na 'Rezervovat pobyt'"

  # ─── INVESTIČNÍ MODEL ────────────────────────────────────
  - name: "investment"
    label: "💰 Investiční model"
    files:
      - name: "scenarios"
        label: "Výnosové scénáře"
        file: "_data/investment.json"
        fields:
          - label: "Celková investice (text)"
            name: "total_investment"
            widget: "string"
            hint: "Např. 3 440 000 Kč"
          - label: "Poznámka k investici"
            name: "total_note"
            widget: "string"
          - label: "Konzervativní scénář"
            name: "conservative"
            widget: "object"
            fields:
              - { label: "Obsazenost", name: "occupancy", widget: "string" }
              - { label: "Výnos p.a.", name: "yield", widget: "string" }
              - { label: "Čistý výnos / rok", name: "net", widget: "string" }
              - { label: "Počet nocí", name: "nights", widget: "number" }
          - label: "Realistický scénář"
            name: "realistic"
            widget: "object"
            fields:
              - { label: "Obsazenost", name: "occupancy", widget: "string" }
              - { label: "Výnos p.a.", name: "yield", widget: "string" }
              - { label: "Čistý výnos / rok", name: "net", widget: "string" }
              - { label: "Počet nocí", name: "nights", widget: "number" }
          - label: "Optimistický scénář"
            name: "optimistic"
            widget: "object"
            fields:
              - { label: "Obsazenost", name: "occupancy", widget: "string" }
              - { label: "Výnos p.a.", name: "yield", widget: "string" }
              - { label: "Čistý výnos / rok", name: "net", widget: "string" }
              - { label: "Počet nocí", name: "nights", widget: "number" }
          - label: "Poznámka pod tabulkou"
            name: "footnote"
            widget: "text"

  # ─── CENÍK / APARTMÁNY ───────────────────────────────────
  - name: "apartments"
    label: "🏠 Apartmány — Ceník"
    label_singular: "Apartmán"
    folder: "_data/apartments"
    create: true
    slug: "{{fields.number}}"
    identifier_field: "number"
    fields:
      - { label: "Číslo jednotky", name: "number", widget: "string", hint: "Např. 131/7" }
      - label: "Podlaží"
        name: "floor"
        widget: "select"
        options: ["1NP", "2NP"]
      - label: "Dispozice"
        name: "layout"
        widget: "select"
        options: ["1+kk", "2+kk", "3+kk"]
      - { label: "Plocha (m²)", name: "size", widget: "string", hint: "Např. 15,93" }
      - { label: "Terasa (m²)", name: "terasa", widget: "string", required: false,
          hint: "Ponechat prázdné pokud není terasa" }
      - { label: "Parkování (počet míst)", name: "parking", widget: "number", default: 1 }
      - { label: "Cena (Kč bez mezer)", name: "price", widget: "string", required: false,
          hint: "Ponechat prázdné = 'Projekt v přípravě'. Formát: 2990000" }
      - label: "Stav"
        name: "status"
        widget: "select"
        options:
          - { label: "Dostupný", value: "available" }
          - { label: "Rezervovaný", value: "reserved" }
          - { label: "Prodaný", value: "sold" }
        default: "available"
      - label: "Zobrazit pouze na /investice"
        name: "hidden_on_hotel"
        widget: "boolean"
        default: false
        hint: "Byty v 1NP — zobrazit jen na stránce Investice/Apartmány"

  # ─── TÝM ─────────────────────────────────────────────────
  - name: "team"
    label: "👥 Tým"
    label_singular: "Člen týmu"
    folder: "_data/team"
    create: true
    slug: "{{fields.slug}}"
    fields:
      - { label: "Slug (bez mezer)", name: "slug", widget: "string", hint: "Např. petr-morong" }
      - { label: "Jméno", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Bio", name: "bio", widget: "text" }
      - { label: "Foto", name: "photo", widget: "image" }
      - { label: "Pořadí zobrazení", name: "order", widget: "number", default: 1 }

  # ─── LOGA PARTNERŮ ───────────────────────────────────────
  - name: "partners"
    label: "🏢 Partneři — Loga"
    label_singular: "Partner"
    folder: "_data/partners"
    create: true
    slug: "{{fields.name}}"
    fields:
      - { label: "Název", name: "name", widget: "string" }
      - { label: "Logo", name: "logo", widget: "image" }
      - { label: "URL webu", name: "url", widget: "string" }
      - label: "Skupina"
        name: "group"
        widget: "select"
        options:
          - { label: "Petrův projekt", value: "petr" }
          - { label: "Frantův projekt", value: "franta" }
      - { label: "Pořadí", name: "order", widget: "number", default: 1 }

  # ─── TEXTY SEKCÍ ─────────────────────────────────────────
  - name: "content"
    label: "📝 Texty sekcí"
    files:
      - name: "hero"
        label: "Hero sekce"
        file: "_data/hero.json"
        fields:
          - { label: "Nadpis řádek 1", name: "line1", widget: "string" }
          - { label: "Nadpis řádek 2", name: "line2", widget: "string" }
          - { label: "Nadpis řádek 3 (zlatý, kurzíva)", name: "line3", widget: "string" }
          - { label: "Popis pod nadpisem", name: "desc", widget: "text" }

      - name: "wellness"
        label: "Wellness sekce"
        file: "_data/wellness.json"
        fields:
          - { label: "Nadpis", name: "title", widget: "string" }
          - { label: "Popis", name: "desc", widget: "text" }
          - label: "Prvky wellness"
            name: "features"
            widget: "list"
            fields:
              - { label: "Emoji ikona", name: "icon", widget: "string" }
              - { label: "Název", name: "title", widget: "string" }
              - { label: "Popis", name: "desc", widget: "string" }

      - name: "financing"
        label: "Financování sekce"
        file: "_data/financing.json"
        fields:
          - { label: "Nadpis", name: "title", widget: "string" }
          - { label: "Popis", name: "desc", widget: "text" }
          - label: "Body výhod"
            name: "items"
            widget: "list"
            fields:
              - { label: "Emoji ikona", name: "icon", widget: "string" }
              - { label: "Nadpis", name: "title", widget: "string" }
              - { label: "Text", name: "desc", widget: "text" }

  # ─── APARTMÁNY — JEDNOTNÝ DATOVÝ SOUBOR ─────────────────
  - name: "apartmany_json"
    label: "🏠 Apartmány (detail stránky)"
    files:
      - name: "apartmany"
        label: "Seznam všech apartmánů"
        file: "data/apartmany.json"
        fields:
          - label: "Apartmány"
            name: "apartmany"
            widget: "list"
            label_singular: "Apartmán"
            summary: "{{fields.cislo}} — {{fields.dispozice}} ({{fields.stav}})"
            fields:
              - { label: "ID (URL slug)", name: "id", widget: "string", hint: "Unikátní, bez mezer a háčků, např. ap-1" }
              - { label: "Číslo apartmánu", name: "cislo", widget: "string" }
              - { label: "Dispozice", name: "dispozice", widget: "string", hint: "Např. 1+kk s terasou" }
              - { label: "Podlaží", name: "podlazi", widget: "string", hint: "Např. 2.NP" }
              - { label: "Plocha (m²)", name: "plocha", widget: "number", value_type: "float", min: 0 }
              - { label: "Terasa (m²)", name: "terasa", widget: "number", value_type: "float", required: false, hint: "Vynechat pokud není terasa" }
              - { label: "Parkování v ceně", name: "parking", widget: "boolean", default: true }
              - { label: "Cena (Kč, jen číslice)", name: "cena", widget: "string", required: false, hint: "Prázdné = 'Cena na vyžádání'. Formát: 3440000" }
              - label: "Stav"
                name: "stav"
                widget: "select"
                options:
                  - { label: "Volný", value: "Volný" }
                  - { label: "Rezervovaný", value: "Rezervovaný" }
                  - { label: "Prodaný", value: "Prodaný" }
                default: "Volný"
              - { label: "Koeficient v poolu", name: "koeficient", widget: "number", value_type: "float", required: false,
                  hint: "0.85 malý pokoj · 1.00 vzorová 1+kk · 1.20 s terasou · 1.40 2+kk · 1.60 mezonet/loft" }
              - { label: "Výhled", name: "vyhled", widget: "string", required: false, hint: "Např. Do přírody, Do zahrady" }
              - { label: "Orientace", name: "orientace", widget: "string", required: false, hint: "Např. Jih, Západ" }
              - { label: "Popis", name: "popis", widget: "text", required: false }
              - { label: "Půdorys (obrázek)", name: "pudorys", widget: "image", required: false }
              - { label: "Karta bytu (PDF)", name: "karta_pdf", widget: "file", required: false, hint: "Volitelné — PDF ke stažení" }
              - label: "Galerie (obrázky)"
                name: "galerie"
                widget: "list"
                required: false
                field: { label: "Obrázek", name: "image", widget: "image" }
              - label: "Místnosti"
                name: "mistnosti"
                widget: "list"
                required: false
                label_singular: "Místnost"
                summary: "{{fields.nazev}} — {{fields.plocha}} m²"
                fields:
                  - { label: "Název místnosti", name: "nazev", widget: "string" }
                  - { label: "Povrch podlahy", name: "povrch", widget: "string" }
                  - { label: "Plocha (m²)", name: "plocha", widget: "number", value_type: "float" }
              - label: "Výhody apartmánu"
                name: "vyhody"
                widget: "list"
                required: false
                hint: "Krátké odrážky — terasa, výhled, parkování…"
                field: { label: "Výhoda", name: "vyhoda", widget: "string" }

  # ─── GALERIE ─────────────────────────────────────────────
  - name: "gallery"
    label: "🖼️ Galerie"
    files:
      - name: "slider"
        label: "Hero slider fotky"
        file: "_data/gallery.json"
        fields:
          - label: "Fotky"
            name: "images"
            widget: "list"
            fields:
              - { label: "Fotka", name: "image", widget: "image" }
              - { label: "Alt popis", name: "alt", widget: "string" }
